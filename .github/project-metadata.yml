# 记账本 — 项目元信息
# 此文件为机器可读的项目元信息，供 CI/CD、Agent 和工具使用

project:
  name: "daily-ledger"
  description: "个人记账小工具，供单用户记录和查看每日消费明细"
  version: "0.1.0"
  stage: "development"  # development / staging / production
  created: "2026-04-19"
  user_scale: "单用户（个人自用）"
  design_principle: "极简实用，部署简单，零依赖原则"

tech_stack:
  language: "Python"
  language_version: "3.12"
  backend_framework: "FastAPI"
  frontend: "Jinja2 + 原生 HTML/CSS"
  orm: "SQLAlchemy (async)"
  database: "SQLite"
  database_driver: "aiosqlite"
  test_framework: "pytest + pytest-asyncio"
  config: ".env + python-dotenv"
  package_manager: "uv"

code_quality:
  formatter: "ruff"
  linter: "ruff"
  type_checker: "mypy"
  test_framework: "pytest"
  min_coverage: 80

commands:
  install: "uv sync"
  dev: "uv run uvicorn src.main:app --reload"
  test: "uv run pytest"
  test_coverage: "uv run pytest --cov=src --cov-report=term-missing"
  lint: "uv run ruff check ."
  format: "uv run ruff format ."

structure:
  source_dir: "src"
  test_dir: "tests"
  docs_dir: "docs"
  scripts_dir: "scripts"

conventions:
  commit_format: "conventional-commits"
  branch_strategy: "github-flow"
  code_review: "recommended"
